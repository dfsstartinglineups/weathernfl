name: Update NFL Weather

on:
  schedule:
    # 1. Game Days (Sun, Mon, Thu, Sat): Runs every 15 minutes, 24/7 on these days
    - cron: '*/15 * * * SUN,MON,THU,SAT'
    
    # 2. Off-Days (Tue, Wed, Fri): Runs once every 3 hours (at the top of the hour)
    - cron: '0 */3 * * TUE,WED,FRI'
  workflow_dispatch:

jobs:
  update-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests firebase-admin
        
      - name: Push to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/fetch_weather.py
