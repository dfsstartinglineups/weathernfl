name: Build SEO Team Pages

on:
  push:
    paths:
      - 'scripts/generate_weather_pages.py'
      - 'data/stadiums.json'
  workflow_dispatch:

jobs:
  build-pages:
    runs-on: ubuntu-latest
    
    # Crucial: Grants GitHub Actions permission to commit files back to your repo
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 1. Install required packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin
          
      # 2. Run the script (using Firebase secret)
      - name: Generate Static HTML
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/generate_weather_pages.py
        
      # 3. Commit and Push back to team_pages/
      - name: Commit and Push Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add team_pages/
          git commit -m "🚀 Auto-generate team SEO pages" || exit 0
          git push
