name: Build SEO Team Pages

on:
  push:
    paths:
      - 'scripts/generate_weather_pages.py'
      - 'data/stadiums.json'
  workflow_dispatch:

jobs:
  build-pages:
    runs-on: ubuntu-latest
    
    # Crucial: Grants GitHub Actions permission to commit files back to your repo
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Generate Static HTML
        run: python scripts/generate_weather_pages.py
        
      - name: Commit and Push Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add team_pages/
          git commit -m "🚀 Auto-generate team SEO pages" || exit 0
          git push
