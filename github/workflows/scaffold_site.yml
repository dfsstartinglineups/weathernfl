name: Manual - Scaffold NFL Repository

on:
  workflow_dispatch: 

jobs:
  build-infrastructure:
    runs-on: ubuntu-latest
    
    # Grants the GITHUB_TOKEN permissions to write to the repository
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Run Master Scaffolding Script
        run: python build_nfl_site.py
        
      - name: Commit and Push Repository Structure
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all newly generated folders and files
          git add js/ scripts/ data/ team_pages/ index.html .github/workflows/
          
          git commit -m "🚀 Auto-scaffold complete NFL Weather repository structure" || exit 0
          git push
